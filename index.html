<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pranesh ❤️ Sneha Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  scroll-behavior: smooth;
  background: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1523438885200-e635ba2c371e') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3em;
}

.hero button {
  padding: 12px 25px;
  border: none;
  background: #fff;
  color: black;
  border-radius: 20px;
  margin-top: 20px;
}

/* SECTION */
.section {
  padding: 60px 20px;
  text-align: center;
}

/* CARDS */
.card {
  background: #fff5f5;
  padding: 20px;
  margin: 15px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* GALLERY */
.gallery img {
  width: 90%;
  margin: 10px;
  border-radius: 15px;
}

/* BUTTON */
.button {
  display: inline-block;
  padding: 10px 20px;
  background: #e91e63;
  color: white;
  border-radius: 20px;
  text-decoration: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- HERO -->
<div class="hero">
  <h1>Pranesh ❤️ Sneha</h1>
  <p>May 25, 2026</p>
  <button onclick="document.getElementById('details').scrollIntoView()">
    View Invitation ↓
  </button>
</div>

<!-- STORY -->
<div class="section">
  <h2>Our Story 💕</h2>
  <p>Two souls, one journey, forever begins here.</p>
</div>

<!-- EVENTS -->
<div class="section" id="details">
  <h2>Wedding Events</h2>

  <div class="card">
    <h3>Mehendi</h3>
    <p>May 23 – 5 PM</p>
  </div>

  <div class="card">
    <h3>Reception</h3>
    <p>May 24 – 7 PM</p>
  </div>

  <div class="card">
    <h3>Wedding</h3>
    <p>May 25 – 6 AM</p>
  </div>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery 📸</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
    <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
  </div>
</div>

<!-- VENUE -->
<div class="section">
  <h2>Venue 📍</h2>
  <p>PVK Marriage Hall, Dindigul</p>

  <a class="button" href="https://www.google.com/maps/search/PVK+Marriage+Hall+Dindigul">
    Open Map
  </a>
</div>

<!-- RSVP -->
<div class="section">
  <h2>RSVP 💌</h2>
  <a class="button" href="https://wa.me/91XXXXXXXXXX">
    Confirm on WhatsApp
  </a>
</div>

<!-- FOOTER -->
<div class="section">
  <p>With love ❤️ Pranesh & Sneha</p>
</div>

</body>
</html>
