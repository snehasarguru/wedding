<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pranesh ❤️ Sneha Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(#2b0000, #000);
  color: white;
  overflow-x: hidden;
  text-align: center;
}

/* ENTRY */
#entry {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

/* GOLD TEXT */
.gold {
  font-family: 'Playfair Display', serif;
  font-size: 3em;
  background: linear-gradient(90deg, gold, white, gold);
  -webkit-background-clip: text;
  color: transparent;
  animation: shine 3s infinite linear;
}
@keyframes shine {
  0% {background-position: 0%}
  100% {background-position: 200%}
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: gold;
  border-radius: 25px;
  border: none;
}

/* SECTION */
.section {
  padding: 60px 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
}

/* FLOWERS */
.flower {
  position: fixed;
  top: -50px;
  font-size: 20px;
  animation: fall linear infinite;
}
@keyframes fall {
  to { transform: translateY(110vh); }
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
}
.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* BUTTON */
.button {
  background: gold;
  color: black;
  padding: 10px 20px;
  border-radius: 20px;
  text-decoration: none;
}

/* RSVP FORM */
input, textarea {
  width: 80%;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry">
  <h1 class="gold">You're Invited 💌</h1>
  <button class="btn" onclick="openInvite()">Open Invitation</button>
</div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<audio id="bell">
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<!-- HERO -->
<div class="section">
  <h1 class="gold">Pranesh ❤️ Sneha</h1>
  <p>May 25, 2026</p>
  <div id="countdown"></div>
</div>

<!-- TAMIL TOGGLE -->
<div class="section">
  <button class="button" onclick="toggleLang()">தமிழ் / English</button>
</div>

<!-- EVENTS -->
<div class="section fade">
  <h2 id="eventTitle">Wedding Events</h2>
  <div class="card">Mehendi - May 23</div>
  <div class="card">Reception - May 24</div>
  <div class="card">Wedding - May 25</div>
</div>

<!-- VENUE -->
<div class="section fade">
  <h2>Venue 📍</h2>
  <p>PVK Marriage Hall, Dindigul</p>
  <a class="button" href="https://www.google.com/maps/search/PVK+Marriage+Hall+Dindigul">View Map</a>
</div>

<!-- RSVP FORM -->
<div class="section fade">
  <h2>RSVP 💌</h2>
  <form>
    <input type="text" placeholder="Your Name"><br>
    <input type="number" placeholder="Guests Count"><br>
    <textarea placeholder="Message"></textarea><br>
    <button class="button">Submit</button>
  </form>
</div>

<script>
// OPEN
function openInvite(){
 document.getElementById("entry").style.display="none";
 document.getElementById("music").play();
 document.getElementById("bell").play();
 fireworks();
}

// COUNTDOWN
var d=new Date("May 25, 2026 06:00:00").getTime();
setInterval(()=>{
 let n=new Date().getTime();
 let t=d-n;
 let days=Math.floor(t/(1000*60*60*24));
 document.getElementById("countdown").innerHTML=days+" days to go";
},1000);

// FLOWERS
setInterval(()=>{
 let f=document.createElement("div");
 f.className="flower";
 f.innerHTML="🌸";
 f.style.left=Math.random()*100+"vw";
 f.style.animationDuration=(3+Math.random()*5)+"s";
 document.body.appendChild(f);
 setTimeout(()=>f.remove(),8000);
},300);

// FIREWORKS
function fireworks(){
 for(let i=0;i<20;i++){
   let f=document.createElement("div");
   f.innerHTML="✨";
   f.style.position="fixed";
   f.style.left="50%";
   f.style.top="50%";
   f.style.transform=`translate(${Math.random()*200-100}px,${Math.random()*200-100}px)`;
   document.body.appendChild(f);
   setTimeout(()=>f.remove(),1000);
 }
}

// SCROLL
const faders=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
 faders.forEach(el=>{
   if(el.getBoundingClientRect().top<window.innerHeight-50){
     el.classList.add('show');
   }
 });
});

// LANGUAGE TOGGLE
let tamil=false;
function toggleLang(){
 tamil=!tamil;
 document.getElementById("eventTitle").innerText =
 tamil ? "திருமண நிகழ்வுகள்" : "Wedding Events";
}
</script>

</body>
</html>
