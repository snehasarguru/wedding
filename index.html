<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pranesh ❤️ Sneha Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fffaf5;
  scroll-behavior: smooth;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(90,0,0,0.6), rgba(90,0,0,0.6)),
  url('https://images.unsplash.com/photo-1519741497674-611481863552');
  background-size: cover;
  background-position: center;
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3em;
}

.hero p {
  font-size: 1.2em;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: gold;
  border: none;
  border-radius: 25px;
}

/* SECTION */
.section {
  padding: 60px 20px;
  text-align: center;
}

/* CARD */
.card {
  background: white;
  margin: 20px auto;
  padding: 20px;
  border-radius: 20px;
  max-width: 400px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* GALLERY */
.gallery img {
  width: 90%;
  border-radius: 15px;
  margin: 10px;
}

/* BUTTON */
.button {
  display: inline-block;
  padding: 12px 25px;
  background: #8b0000;
  color: white;
  border-radius: 25px;
  text-decoration: none;
  margin-top: 10px;
}

/* COUNTDOWN */
#countdown {
  font-size: 1.3em;
  margin-top: 10px;
}

/* ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- HERO -->
<div class="hero">
  <h1>Pranesh ❤️ Sneha</h1>
  <p>May 25, 2026</p>
  <div id="countdown"></div>
  <button class="btn" onclick="scrollDown()">View Invitation</button>
</div>

<!-- STORY -->
<div class="section fade">
  <h2>Our Story 💕</h2>
  <p>Two hearts unite in love and tradition 🪔</p>
</div>

<!-- EVENTS -->
<div class="section fade">
  <h2>Wedding Events</h2>

  <div class="card">
    <h3>Mehendi</h3>
    <p>May 23 – 5 PM</p>
  </div>

  <div class="card">
    <h3>Reception</h3>
    <p>May 24 – 7 PM</p>
  </div>

  <div class="card">
    <h3>Wedding</h3>
    <p>May 25 – 6 AM</p>
  </div>
</div>

<!-- GALLERY -->
<div class="section fade">
  <h2>Gallery 📸</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
    <img src="https://images.unsplash.com/photo-1523438885200-e635ba2c371e">
  </div>
</div>

<!-- VENUE -->
<div class="section fade">
  <h2>Venue 📍</h2>
  <p>PVK Marriage Hall, Dindigul</p>

  <a class="button" href="https://www.google.com/maps/search/PVK+Marriage+Hall+Dindigul">
    View Location
  </a>
</div>

<!-- RSVP -->
<div class="section fade">
  <h2>RSVP 💌</h2>
  <a class="button" href="https://wa.me/91XXXXXXXXXX">
    Confirm via WhatsApp
  </a>
</div>

<!-- FOOTER -->
<div class="section">
  <p>With love ❤️ Pranesh & Sneha</p>
</div>

<!-- SCRIPT -->
<script>
function scrollDown() {
  window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
}

// COUNTDOWN
var weddingDate = new Date("May 25, 2026 06:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var d = weddingDate - now;

  var days = Math.floor(d/(1000*60*60*24));
  var hrs = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  var min = Math.floor((d%(1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
    days + " days " + hrs + " hrs " + min + " mins";
}, 1000);

// SCROLL ANIMATION
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});
</script>

</body>
  </html>
