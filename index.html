<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pranesh ❤️ Sneha</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* FULLSCREEN SECTIONS */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  opacity: 0;
  transform: scale(1.1);
  transition: 1s ease;
}

.section.show {
  opacity: 1;
  transform: scale(1);
}

/* BACKGROUNDS */
.bg1 { background: linear-gradient(#000000aa,#000000aa),
 url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover; }

.bg2 { background: linear-gradient(#000000aa,#000000aa),
 url('https://images.unsplash.com/photo-1523438885200-e635ba2c371e') center/cover; }

.bg3 { background: linear-gradient(#000000aa,#000000aa),
 url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') center/cover; }

/* TEXT */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.8em;
  animation: fadeUp 2s ease;
}

p {
  font-size: 1.2em;
  animation: fadeUp 2.5s ease;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: gold;
  border-radius: 25px;
  color: black;
  text-decoration: none;
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0; transform: translateY(40px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- SCREEN 1 -->
<div class="section bg1">
  <h1>You're Invited 💌</h1>
  <p>To celebrate love & togetherness</p>
</div>

<!-- SCREEN 2 -->
<div class="section bg2">
  <h1>Pranesh ❤️ Sneha</h1>
  <p>May 25, 2026</p>
</div>

<!-- SCREEN 3 -->
<div class="section bg3">
  <h1>Wedding</h1>
  <p>6:00 AM</p>
</div>

<!-- SCREEN 4 -->
<div class="section bg2">
  <h1>Venue</h1>
  <p>PVK Marriage Hall, Dindigul</p>
  <a class="btn" href="https://www.google.com/maps/search/PVK+Marriage+Hall+Dindigul">View Map</a>
</div>

<script>
// AUTO SCROLL LIKE VIDEO
let sections = document.querySelectorAll('.section');
let index = 0;

function showNext() {
  sections.forEach(s => s.classList.remove('show'));
  sections[index].classList.add('show');
  index = (index + 1) % sections.length;
}

showNext();
setInterval(showNext, 4000);
</script>

</body>
</html>
